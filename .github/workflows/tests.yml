name: Check OCI Capacity

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-progress

      - name: Create OCI private key file
        run: echo "${{ secrets.OCI_PRIVATE_KEY }}" > /tmp/oci_private_key.pem

      - name: Run capacity check
        env:
          OCI_REGION:               ${{ secrets.OCI_REGION }}
          OCI_USER_ID:              ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID:           ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT:      ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /tmp/oci_private_key.pem
          OCI_AVAILABILITY_DOMAIN:  ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID:            ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID:             ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY:       ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_SHAPE:                VM.Standard.A1.Flex
          OCI_OCPUS:                4
          OCI_MEMORY_IN_GBS:        24
        run: php index.php
      - name: Disable workflow on success
        if: success()
        run: |
          if grep -q "ocid1.instance" /tmp/oci_output.txt 2>/dev/null; then
            curl -X PUT \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/tests.yml/disable
          fi
