name: Check OCI Capacity

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allows manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Create private key file
        run: echo "${{ secrets.OCI_PRIVATE_KEY }}" > /tmp/oci_private_key.pem

      - name: Run script
        env:
          OCI_CLI_USER:         ${{ secrets.OCI_USER_ID }}
          OCI_CLI_TENANCY:      ${{ secrets.OCI_TENANCY_ID }}
          OCI_CLI_FINGERPRINT:  ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_KEY_FILE:     /tmp/oci_private_key.pem
          OCI_CLI_REGION:       ${{ secrets.OCI_REGION }}
          OCI_SUBNET_ID:        ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID:         ${{ secrets.OCI_IMAGE_ID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SSH_PUBLIC_KEY:   ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_COMPARTMENT_ID:   ${{ secrets.OCI_TENANCY_ID }}
          OCI_SHAPE:            VM.Standard.A1.Flex
          OCI_OCPUS:            4
          OCI_MEMORY_IN_GBS:    24
        run: php index.php
